spring.application.name=HMS
spring.config.import=optional:file:.env.properties

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db
spring.datasource.username=root
spring.datasource.password=${spring.datasource.password:YOUR_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration
app.jwtSecret=${app.jwtSecret:YOUR_JWT_SECRET_KEY}
app.jwtExpirationMs=86400000

# SendGrid Configuration
sendgrid.api.key=${sendgrid.api.key:YOUR_SENDGRID_API_KEY}
sendgrid.from.email=${sendgrid.from.email:your_email@example.com}

# Google Gemini AI Configuration (free tier)
gemini.api.key=${gemini.api.key:YOUR_GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Razorpay Payment Gateway Configuration
razorpay.key.id=${razorpay.key.id:YOUR_RAZORPAY_KEY_ID}
razorpay.key.secret=${razorpay.key.secret:YOUR_RAZORPAY_KEY_SECRET}